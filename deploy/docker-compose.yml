# =============================================================================
# BSGateway Production Docker Compose
# =============================================================================
# LLM routing gateway + PostgreSQL + Redis
#
# Usage:
#   docker-compose up -d
# =============================================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  # ===========================================================================
  # Infrastructure
  # ===========================================================================

  postgres:
    logging: *default-logging
    image: postgres:16-alpine
    container_name: bsgateway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bsgateway}
      POSTGRES_USER: ${POSTGRES_USER:-bsgateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bsgateway}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - bsgateway-network

  redis:
    logging: *default-logging
    image: redis:7-alpine
    container_name: bsgateway-redis
    restart: unless-stopped
    command: >
      sh -c '[ -n "$$REDIS_PASSWORD" ] && exec redis-server --requirepass "$$REDIS_PASSWORD" --maxmemory 256mb --maxmemory-policy allkeys-lru || exec redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD --no-auth-warning} ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - bsgateway-network

  # ===========================================================================
  # Application
  # ===========================================================================

  app:
    logging: *default-logging
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: bsgateway-app
    restart: unless-stopped
    ports:
      - "4000:8000"
    env_file: .env
    environment:
      GATEWAY_CONFIG_PATH: /app/gateway.yaml
      PYTHONPATH: /app
      COLLECTOR_DATABASE_URL: postgresql://${POSTGRES_USER:-bsgateway}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bsgateway}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      FRONTEND_DIST_DIR: /app/frontend/dist
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    volumes:
      - ../logs:/app/logs
    networks:
      - bsgateway-network

volumes:
  postgres-data:
    name: bsgateway-postgres-data
  redis-data:
    name: bsgateway-redis-data

networks:
  bsgateway-network:
    driver: bridge
    name: bsgateway-network
