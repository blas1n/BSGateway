# ============================================================
# BSGateway - Unified Configuration
# ============================================================
# Single source of truth for model definitions + routing rules.
# LiteLLM reads model_list/litellm_settings/general_settings.
# BSGateway reads the routing section + model_list for passthrough.
# ============================================================

# === Model Definitions ===
model_list:
  # --- Auto (virtual model for complexity-based routing) ---
  # The hook rewrites this before the actual call, so the target is irrelevant.
  - model_name: "auto"
    litellm_params:
      model: "openai/gpt-5-mini"
      api_key: "os.environ/OPENAI_API_KEY"

  # --- Local LLM (external Ollama or compatible server) ---
  - model_name: "local/glm-4.7-flash"
    litellm_params:
      model: "ollama_chat/glm-4.7-flash"
      api_base: "os.environ/LOCAL_LLM_API_BASE"

  # --- OpenAI ---
  - model_name: "gpt-5-mini"
    litellm_params:
      model: "openai/gpt-5-mini"
      api_key: "os.environ/OPENAI_API_KEY"

  # --- Anthropic ---
  - model_name: "claude-opus"
    litellm_params:
      model: "anthropic/claude-opus-4-6"
      api_key: "os.environ/ANTHROPIC_API_KEY"
  - model_name: "claude-sonnet"
    litellm_params:
      model: "anthropic/claude-sonnet-4-6"
      api_key: "os.environ/ANTHROPIC_API_KEY"

# === LiteLLM Settings ===
litellm_settings:
  callbacks:
    - bsgateway.routing.hook.proxy_handler_instance
  drop_params: true
  num_retries: 2
  request_timeout: 120
  json_logs: true

router_settings:
  routing_strategy: "simple-shuffle"
  num_retries: 2

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"

# === BSGateway Routing ===
# LiteLLM ignores this section; only our hook reads it.
# passthrough_models is auto-derived from model_list above.
routing:
  fallback_tier: "medium"

  tiers:
    simple:
      score_range: [0, 30]
      model: "local/glm-4.7-flash"
    medium:
      score_range: [31, 65]
      model: "gpt-5-mini"
    complex:
      score_range: [66, 100]
      model: "claude-opus"

  aliases:
    auto: "auto_route"

  # Pattern-based auto-routing (fnmatch glob syntax).
  # Any requested model matching a pattern here is auto-routed by complexity.
  # This eliminates the need to update aliases every time Claude Code
  # ships a new default model ID (e.g. claude-sonnet-4-7, claude-opus-5-0).
  auto_route_patterns:
    - "claude-*"

  classifier:
    strategy: "llm"  # "static" | "llm" | "ml"

    # LLM classifier config (used when strategy: llm)
    llm:
      api_base: "os.environ/LOCAL_LLM_API_BASE"
      model: "ollama_chat/glm-4.7-flash"
      timeout: 3.0

    # Static classifier config (also used as LLM fallback)
    static:
      weights:
        token_count: 0.25
        system_prompt: 0.20
        keyword_patterns: 0.25
        conversation_length: 0.10
        code_complexity: 0.15
        tool_usage: 0.05

      token_thresholds:
        low: 500
        medium: 2000
        high: 8000

      complex_keywords:
        - "architect"
        - "design system"
        - "trade-off"
        - "security audit"
        - "refactor"
        - "optimize"
        - "deep analysis"
        - "review code"
        - "debug complex"
        - "performance"
        - "scalability"
        - "implement"
        - "function"
        - "build"
        - "create"

      simple_keywords:
        - "hello"
        - "hi"
        - "thanks"
        - "convert"
        - "format"
        - "translate"
        - "summarize"
        - "what is"
        - "how to"
        - "explain"

  collector:
    enabled: true
    embedding:
      api_base: "os.environ/LOCAL_LLM_API_BASE"
      model: "qwen3-embedding"
      timeout: 5.0
      max_chars: 1000
