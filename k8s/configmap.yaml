apiVersion: v1
kind: ConfigMap
metadata:
  name: bsgateway-config
  namespace: bsgateway
data:
  gateway.yaml: |
    # LiteLLM Proxy configuration (loaded from ConfigMap)
    model_list:
      - model_name: gpt-4o
        litellm_model: openai/gpt-4o
        api_base: https://api.openai.com/v1
      - model_name: claude-sonnet
        litellm_model: anthropic/claude-3-5-sonnet
      - model_name: claude-opus
        litellm_model: anthropic/claude-3-opus
    
    # Router configuration
    router_settings:
      default_fallback_model: gpt-4o
  
  logging.yaml: |
    version: 1
    formatters:
      json:
        format: '{"timestamp": "%(asctime)s", "level": "%(levelname)s", "message": "%(message)s"}'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: json
    root:
      level: INFO
      handlers: [console]
