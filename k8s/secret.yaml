apiVersion: v1
kind: Secret
metadata:
  name: bsgateway-secrets
  namespace: bsgateway
type: Opaque
stringData:
  # PostgreSQL
  POSTGRES_USER: bsgateway-prod
  POSTGRES_PASSWORD: "CHANGE-ME-IN-PRODUCTION"  # Use strong password
  
  # Redis
  REDIS_PASSWORD: "CHANGE-ME-IN-PRODUCTION"  # Use strong password
  
  # JWT
  JWT_SECRET: "change-me-to-a-secure-secret-key-32-chars-min"
  
  # Encryption
  ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"  # 64 hex chars
  
  # Superadmin
  SUPERADMIN_KEY: "superadmin-change-me-in-production"
  
  # LiteLLM Master Key
  LITELLM_MASTER_KEY: "sk-change-me-to-a-secure-key"
  
  # API Keys
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
