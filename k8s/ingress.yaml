apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bsgateway-ingress
  namespace: bsgateway
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - bsgateway.example.com
    secretName: bsgateway-tls
  rules:
  - host: bsgateway.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bsgateway-api
            port:
              number: 80
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@example.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
