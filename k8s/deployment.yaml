apiVersion: apps/v1
kind: Deployment
metadata:
  name: bsgateway-api
  namespace: bsgateway
  labels:
    app: bsgateway-api
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: bsgateway-api
  template:
    metadata:
      labels:
        app: bsgateway-api
        version: v1
    spec:
      serviceAccountName: bsgateway-api
      containers:
      - name: api
        image: bsgateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        # Environment from Secrets
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: COLLECTOR_DATABASE_URL
          value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres.bsgateway:5432/bsgateway"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: bsgateway-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bsgateway-secrets
              key: POSTGRES_PASSWORD
        - name: REDIS_HOST
          value: "redis.bsgateway"
        - name: REDIS_PORT
          value: "6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: bsgateway-secrets
              key: REDIS_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: bsgateway-secrets
              key: JWT_SECRET
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: bsgateway-secrets
              key: ENCRYPTION_KEY
        - name: SUPERADMIN_KEY
          valueFrom:
            secretKeyRef:
              name: bsgateway-secrets
              key: SUPERADMIN_KEY
        
        # Liveness probe
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        # Resource limits
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        # Security context
        securityContext:
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        
        # Volume mounts
        volumeMounts:
        - name: config
          mountPath: /app/gateway.yaml
          subPath: gateway.yaml
          readOnly: true
        - name: tmp
          mountPath: /tmp
      
      # Volumes
      volumes:
      - name: config
        configMap:
          name: bsgateway-config
      - name: tmp
        emptyDir: {}
      
      # Pod disruption budget
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - bsgateway-api
              topologyKey: kubernetes.io/hostname
      
      terminationGracePeriodSeconds: 30
