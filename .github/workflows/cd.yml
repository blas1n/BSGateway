name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: bsgateway
  HEALTH_URL: http://localhost:4000/health
  COMPOSE_FILE: deploy/docker-compose.yml

jobs:
  deploy-backend:
    runs-on: [self-hosted, bsvibe]
    steps:
      - name: Pull latest
        run: |
          cd ~/Works/BSGateway/main
          git fetch origin main --quiet
          git merge origin/main --ff-only

      - name: Run migrations
        run: |
          cd ~/Works/BSGateway/main
          [ -f alembic.ini ] && uv run alembic upgrade head || true

      - name: Build and deploy
        run: |
          cd ~/Works/BSGateway/main
          docker compose -p ${{ env.PROJECT_NAME }} -f ${{ env.COMPOSE_FILE }} up -d --build

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            curl -sf ${{ env.HEALTH_URL }} > /dev/null && echo "✓ Healthy" && exit 0
            sleep 3
          done
          echo "✗ Health check failed" && exit 1

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: cd frontend && pnpm install --frozen-lockfile

      - run: cd frontend && pnpm build

      - run: cd frontend && npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
