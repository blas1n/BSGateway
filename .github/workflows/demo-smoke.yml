name: Demo smoke

# Boots demo backend (Docker) + builds & serves demo frontend, then runs
# the @bsvibe/demo Playwright suite against the integrated stack.
# Catches integration bugs that build-only CI misses.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  demo-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      COMPOSE_PROJECT: bsgateway-demo-ci
      BACKEND_PORT: '4500'
      FRONTEND_PORT: '3000'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Generate ephemeral demo secrets + export to GITHUB_ENV
        run: |
          {
            echo "DEMO_JWT_SECRET=$(openssl rand -hex 32)"
            echo "POSTGRES_PASSWORD=$(openssl rand -hex 16)"
            echo "REDIS_PASSWORD=$(openssl rand -hex 16)"
            echo "ENCRYPTION_KEY=$(openssl rand -hex 32)"
            echo "LITELLM_MASTER_KEY=$(openssl rand -hex 32)"
            echo "CORS_ALLOWED_ORIGINS=http://localhost:3000"
            echo "LOG_LEVEL=INFO"
          } | tee deploy/.env.demo >> "$GITHUB_ENV"

      - name: Boot demo backend stack
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          docker compose -p "$COMPOSE_PROJECT" \
            -f deploy/docker-compose.demo.yml \
            --env-file deploy/.env.demo \
            up -d --build --wait
          for _ in $(seq 1 30); do
            if curl -fsS -o /dev/null --max-time 2 "http://localhost:${BACKEND_PORT}/health"; then
              echo "backend healthy"
              break
            fi
            sleep 2
          done

      - name: Frontend deps
        working-directory: frontend
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN || secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Force playwright reuseExistingServer
        working-directory: frontend
        run: |
          # Default reuseExistingServer: !process.env.CI is false in CI,
          # so Playwright tries to launch its own `next dev` even when
          # our prod server is already on port 3000. Force-reuse it.
          sed -i 's/reuseExistingServer: !process.env.CI/reuseExistingServer: true/' playwright.config.ts

      - name: Build frontend in demo mode
        working-directory: frontend
        env:
          NEXT_PUBLIC_BSVIBE_DEMO: '1'
          NEXT_PUBLIC_API_URL: http://localhost:4500
        run: |
          pnpm run build
          echo "::group::dist/ root listing"
          ls -la dist | head -30
          echo "::endgroup::"
          echo "::group::dist/index.html head (if exists)"
          head -c 300 dist/index.html 2>&1 || echo "MISSING"
          echo "::endgroup::"

      - name: Start frontend in background
        working-directory: frontend
        run: |
          # Static export lives in dist/. node http-server kept showing the
          # .next build-cache dir even when launched from dist/ — switch to
          # python http.server which has zero indirection and rock-solid
          # behavior on the runner.
          test -f dist/index.html || { echo "::error::dist/index.html missing"; ls -la dist | head -20; exit 1; }
          # Belt and suspenders: ensure no other process is on the port already
          if ss -ltn | grep -q ":${FRONTEND_PORT} "; then
            echo "::error::port ${FRONTEND_PORT} already in use"
            ss -ltnp | head -10
            exit 1
          fi
          cd dist
          nohup python3 -m http.server "$FRONTEND_PORT" --bind 127.0.0.1 > /tmp/frontend.log 2>&1 &
          cd ..
          for _ in $(seq 1 30); do
            if curl -fsS -o /dev/null --max-time 2 "http://localhost:${FRONTEND_PORT}/"; then
              echo "frontend ready"
              break
            fi
            sleep 2
          done
          # Verify what's actually being served
          echo "::group::GET / preview"
          curl -sS http://localhost:"$FRONTEND_PORT"/ | head -c 400
          echo
          echo "::endgroup::"

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Run demo smoke suite
        working-directory: frontend
        env:
          DEMO_E2E_BASE_URL: http://localhost:3000
          DEMO_E2E_API_URL: http://localhost:4500
          # Pin Playwright's webServer/baseURL port to our prod port. The
          # default 5173 means Playwright spawns `next dev -p 5173` in
          # parallel — which, because next.config has distDir: 'dist',
          # clobbers our static export with dev-mode build cache halfway
          # through the test run.
          BSGATEWAY_TEST_FRONTEND_PORT: '3000'
        run: pnpm exec playwright test --grep @demo --project=chromium

      - name: Frontend log (on failure)
        if: failure()
        run: tail -200 /tmp/frontend.log || true

      - name: Upload Playwright trace + screenshots (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 7

      - name: Demo backend logs (on failure)
        if: failure()
        run: |
          docker compose -p "$COMPOSE_PROJECT" \
            -f deploy/docker-compose.demo.yml \
            --env-file deploy/.env.demo \
            logs --tail=200 app
          docker compose -p "$COMPOSE_PROJECT" \
            -f deploy/docker-compose.demo.yml \
            --env-file deploy/.env.demo \
            logs --tail=50 postgres redis

      - name: Tear down
        if: always()
        run: |
          docker compose -p "$COMPOSE_PROJECT" \
            -f deploy/docker-compose.demo.yml \
            --env-file deploy/.env.demo \
            down -v
