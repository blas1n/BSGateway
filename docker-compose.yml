x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  gateway:
    logging: *default-logging
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    env_file: .env
    environment:
      - GATEWAY_CONFIG_PATH=/app/gateway.yaml
      - PYTHONPATH=/app
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme-dev}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bsgateway

  postgres:
    logging: *default-logging
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-bsgateway}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-}
      - POSTGRES_DB=${POSTGRES_DB:-bsgateway}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bsgateway}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bsgateway

  redis:
    logging: *default-logging
    image: redis:7-alpine
    command: >
      sh -c '[ -n "$$REDIS_PASSWORD" ] && exec redis-server --requirepass "$$REDIS_PASSWORD" || exec redis-server'
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme-dev}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD --no-auth-warning} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bsgateway

volumes:
  postgres_data:

networks:
  bsgateway:
    driver: bridge
