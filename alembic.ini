# BSGateway Alembic configuration
#
# Sprint 3 / S3-5: replaces the per-repository raw-SQL ``init_schema``
# bootstrap that ran via :func:`bsgateway.core.database.execute_schema`.
#
# Migration scripts live in ``alembic/versions/``. The DB URL is taken
# from the ``COLLECTOR_DATABASE_URL`` (or ``DATABASE_URL``) environment
# variable in :file:`alembic/env.py` so the same `.env` that drives the
# rest of the gateway works here without a duplicate config block.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8
# sqlalchemy.url is intentionally blank — env.py reads it from the
# pydantic-settings ``Settings`` instance so secrets stay in ``.env``.
sqlalchemy.url =

[post_write_hooks]
# Optional: run ruff format on generated migration files.
# hooks = ruff
# ruff.type = exec
# ruff.executable = uv
# ruff.options = run ruff format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
